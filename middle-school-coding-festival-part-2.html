<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UOB MDS – Middle School – Coding Festival Stage 1 (Part 2)</title>
    <style>
        :root {
            --bg1: #F7FAFF;
            --bg2: #F3F6FF;
            --card: #FFFFFF;
            --ink: #0F172A;
            --muted: #475569;
            --line: rgba(226, 232, 240, .95);
            --brand: #4F46E5;
            --brand2: #06B6D4;
            --ok: #16A34A;
            --bad: #DC2626;
            --warn: #F59E0B;
            --radius: 22px;
            --shadow: 0 18px 40px rgba(15, 23, 42, .08);
            --shadow2: 0 10px 22px rgba(15, 23, 42, .06);
            --focus: 0 0 0 4px rgba(79, 70, 229, .18);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--sans);
            color: var(--ink);
            background:
                radial-gradient(1200px 520px at 10% 0%, rgba(6, 182, 212, .18), transparent 60%),
                radial-gradient(1200px 520px at 90% 0%, rgba(79, 70, 229, .16), transparent 55%),
                linear-gradient(180deg, var(--bg1), var(--bg2) 45%, var(--bg1));
            min-height: 100vh;
        }

        .app {
            width: min(1100px, 96vw);
            margin: 18px auto 26px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, .72);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow2);
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(79, 70, 229, .18), rgba(6, 182, 212, .20));
            border: 1px solid rgba(226, 232, 240, .9);
            display: grid;
            place-items: center;
            font-weight: 1000;
            color: rgba(79, 70, 229, 1);
        }

        .brand h1 {
            margin: 0;
            font-size: 14px;
            line-height: 1.15;
            letter-spacing: .2px;
        }

        .brand .sub {
            font-size: 12px;
            color: var(--muted);
            font-weight: 800;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .9);
            padding: 10px 12px;
            border-radius: 16px;
            font-weight: 1000;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(15, 23, 42, .06);
            transition: transform .06s ease, box-shadow .12s ease, background .12s ease;
            user-select: none;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0px);
        }

        .btn.primary {
            background: linear-gradient(135deg, rgba(79, 70, 229, .12), rgba(6, 182, 212, .14));
            border-color: rgba(79, 70, 229, .18);
        }

        .btn.ghost {
            background: transparent;
            box-shadow: none;
        }

        .btn:focus {
            outline: none;
            box-shadow: var(--focus);
        }

        .progressWrap {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 260px;
            justify-content: flex-end;
        }

        .progress {
            width: 180px;
            height: 10px;
            background: rgba(226, 232, 240, .9);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, .95);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(79, 70, 229, .85), rgba(6, 182, 212, .85));
            border-radius: 999px;
            transition: width .25s ease;
        }

        .count {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            font-weight: 900;
        }

        .stage {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, .60);
            box-shadow: var(--shadow);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: calc(100vh - 145px);
        }

        .slide {
            flex: 1;
            background: rgba(255, 255, 255, .68);
            border: 1px solid rgba(229, 234, 245, .95);
            border-radius: var(--radius);
            box-shadow: var(--shadow2);
            padding: 20px;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .slideInner {
            max-width: 980px;
            margin: 0 auto;
            max-height: calc(100vh - 190px);
            overflow-y: auto;
            padding-right: 8px;
        }

        .slideInner::-webkit-scrollbar {
            width: 10px;
        }

        .slideInner::-webkit-scrollbar-thumb {
            background: rgba(96, 112, 153, .25);
            border-radius: 999px;
            border: 3px solid rgba(255, 255, 255, .9);
        }

        .slideInner::-webkit-scrollbar-track {
            background: transparent;
        }

        h2 {
            margin: 6px 0 10px;
            font-size: 30px;
            letter-spacing: -.3px;
        }

        h3 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        p {
            margin: 0 0 10px;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.55;
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 1000;
            font-size: 12px;
            letter-spacing: .2px;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid rgba(79, 70, 229, .16);
            background: rgba(79, 70, 229, .06);
            color: rgba(55, 65, 81, .95);
        }

        .grid {
            display: grid;
            gap: 14px;
        }

        .cols2 {
            grid-template-columns: 1fr 1fr;
        }

        .cols3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .card {
            background: rgba(255, 255, 255, .92);
            border: 1px solid rgba(226, 232, 240, .95);
            border-radius: 22px;
            padding: 14px;
            box-shadow: 0 10px 18px rgba(15, 23, 42, .06);
        }

        ul.list {
            margin: 8px 0 0 18px;
            color: var(--muted);
            font-weight: 850;
            line-height: 1.55;
        }

        .choices {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .choice {
            border: 1px solid rgba(226, 232, 240, .95);
            border-radius: 18px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, .96);
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
            cursor: pointer;
            user-select: none;
            transition: transform .06s ease, border-color .12s ease, background .12s ease;
        }

        .choice:hover {
            transform: translateY(-1px);
        }

        .choice.active {
            border-color: rgba(79, 70, 229, .35);
            background: rgba(79, 70, 229, .06);
        }

        .choice.ok {
            border-color: rgba(22, 163, 74, .35);
            background: rgba(22, 163, 74, .08);
        }

        .choice.bad {
            border-color: rgba(220, 38, 38, .35);
            background: rgba(220, 38, 38, .08);
        }

        .feedback {
            display: none;
            margin-top: 10px;
            border-radius: 18px;
            padding: 12px 14px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .92);
            color: var(--muted);
            font-weight: 900;
            line-height: 1.5;
        }

        .feedback.show {
            display: block;
        }

        .fbOk {
            border-color: rgba(22, 163, 74, .35);
            background: rgba(22, 163, 74, .08);
            color: rgba(15, 23, 42, .92);
        }

        .fbBad {
            border-color: rgba(220, 38, 38, .35);
            background: rgba(220, 38, 38, .08);
            color: rgba(15, 23, 42, .92);
        }

        .input {
            width: 100%;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .96);
            border-radius: 16px;
            padding: 12px 14px;
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
            resize: vertical;
            min-height: 56px;
        }

        .checklist {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .checkItem {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 18px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .96);
            cursor: pointer;
            user-select: none;
            transition: transform .06s ease, border-color .12s ease, background .12s ease;
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
        }

        .checkItem:hover {
            transform: translateY(-1px);
        }

        .checkItem.done {
            border-color: rgba(79, 70, 229, .30);
            background: rgba(79, 70, 229, .06);
        }

        .checkBox {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 1.5px solid rgba(148, 163, 184, .8);
            display: grid;
            place-items: center;
            font-size: 14px;
            font-weight: 1000;
            color: transparent;
            background: #fff;
            flex: 0 0 auto;
        }

        .checkItem.done .checkBox {
            background: linear-gradient(135deg, rgba(79, 70, 229, .9), rgba(6, 182, 212, .85));
            border-color: transparent;
            color: white;
        }

        .meterWrap {
            margin-top: 12px;
        }

        .meter {
            width: 100%;
            height: 12px;
            background: rgba(226, 232, 240, .9);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, .95);
        }

        .meterBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(79, 70, 229, .85), rgba(6, 182, 212, .85));
            border-radius: 999px;
            transition: width .25s ease;
        }

        .meterText {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
            font-weight: 900;
        }

        .flowBox {
            border-radius: 18px;
            padding: 14px;
            border: 1px dashed rgba(79, 70, 229, .28);
            background: linear-gradient(180deg, rgba(79, 70, 229, .04), rgba(6, 182, 212, .04));
            font-weight: 900;
            color: rgba(30, 41, 59, .92);
        }

        .stepCard {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .stepNum {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-weight: 1000;
            background: linear-gradient(135deg, rgba(79, 70, 229, .16), rgba(6, 182, 212, .16));
            border: 1px solid rgba(79, 70, 229, .18);
            color: rgba(79, 70, 229, 1);
            flex: 0 0 auto;
        }

        @media (max-width: 860px) {
            .cols2,
            .cols3 {
                grid-template-columns: 1fr;
            }

            .progressWrap {
                min-width: unset;
            }

            .progress {
                width: 130px;
            }

            h2 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <div class="logo">MS</div>
                <div>
                    <h1>Middle School</h1>
                    <div class="sub">Coding Festival – Stage 1 (Part 2)</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn ghost" id="btnHome" title="Kembali ke awal">🏠 Awal</button>
                <button class="btn" id="btnPrev" title="Sebelumnya (←)">←</button>
                <button class="btn primary" id="btnNext" title="Berikutnya (→)">→</button>
            </div>

            <div class="progressWrap">
                <div class="progress" aria-label="Progress">
                    <div class="bar" id="bar"></div>
                </div>
                <div class="count" id="count">1/1</div>
            </div>
        </div>

        <div class="stage">
            <div class="slide" role="region" aria-label="Slide">
                <div class="slideInner" id="content"></div>
            </div>
        </div>
    </div>

    <script>
        const slides = [

            {
                title: "Pembuka",
                html: `
                <div class="kicker">Part 2 • App Design, Logic, Testing, Pitching</div>
                <h2>🛠️ Saatnya Mengubah Ide Menjadi Aplikasi</h2>
                <p>Di Part 2, kamu akan fokus pada bagaimana merancang fitur, menyusun alur aplikasi, mengecek apakah aplikasi berjalan dengan benar, dan menyiapkan penjelasan proyekmu.</p>

                <div class="card">
                    <ul class="list">
                        <li>Menentukan fitur utama</li>
                        <li>Menyusun alur input, process, dan output</li>
                        <li>Melakukan testing sederhana</li>
                        <li>Menjelaskan aplikasi dengan jelas</li>
                    </ul>
                </div>
                `
            },

            {
                title: "Fitur Utama",
                html: `
                <h2>📱 Tentukan Fitur Utama Dulu</h2>
                <p>Aplikasi yang baik tidak harus terlalu banyak fitur, tapi harus punya fungsi utama yang jelas.</p>

                <div class="choices" data-quiz="feature">
                    <div class="choice" data-answer="right">Fitur utama membantu pengguna mengelola uang</div>
                    <div class="choice" data-answer="wrong">Fitur utama hanya mengganti warna layar</div>
                    <div class="choice" data-answer="wrong">Fitur utama tidak berhubungan dengan tema proyek</div>
                </div>

                <div class="feedback" data-quiz-feedback="feature"></div>
                `
            },

            {
                title: "Flow Aplikasi",
                html: `
                <h2>🔁 Aplikasi Juga Punya Alur</h2>
                <p>Setiap aplikasi perlu alur yang jelas supaya pengguna tahu apa yang harus dilakukan.</p>

                <div class="grid cols3">
                    <div class="card">
                        <h3>Input</h3>
                        <p>User memasukkan data, misalnya setoran, pengeluaran, atau target tabungan.</p>
                    </div>
                    <div class="card">
                        <h3>Process</h3>
                        <p>Aplikasi menghitung, mengelompokkan, atau membandingkan data.</p>
                    </div>
                    <div class="card">
                        <h3>Output</h3>
                        <p>Aplikasi menampilkan hasil, saldo, kategori, atau progress tabungan.</p>
                    </div>
                </div>
                `
            },

            {
                title: "Pilih Alur",
                html: `
                <h2>🧩 Alur Mana yang Lebih Tepat?</h2>

                <div class="choices" data-quiz="flow">
                    <div class="choice" data-answer="wrong">Aplikasi menampilkan hasil dulu, lalu user baru isi data</div>
                    <div class="choice" data-answer="right">User memasukkan data, aplikasi memproses, lalu hasil ditampilkan</div>
                    <div class="choice" data-answer="wrong">Semua tombol menuju layar yang sama tanpa fungsi</div>
                </div>

                <div class="feedback" data-quiz-feedback="flow"></div>
                `
            },

            {
                title: "Contoh Breakdown",
                html: `
                <h2>💡 Contoh Breakdown Aplikasi</h2>
                <p>Misalnya kamu membuat aplikasi <b>Target Tabungan</b>.</p>

                <div class="grid cols3">
                    <div class="card">
                        <h3>Input</h3>
                        <ul class="list">
                            <li>Nama target</li>
                            <li>Jumlah target</li>
                            <li>Jumlah tabungan saat ini</li>
                        </ul>
                    </div>
                    <div class="card">
                        <h3>Process</h3>
                        <ul class="list">
                            <li>Menghitung sisa target</li>
                            <li>Membandingkan progress</li>
                            <li>Menentukan status target</li>
                        </ul>
                    </div>
                    <div class="card">
                        <h3>Output</h3>
                        <ul class="list">
                            <li>Sisa tabungan</li>
                            <li>Persentase progress</li>
                            <li>Pesan semangat / reminder</li>
                        </ul>
                    </div>
                </div>
                `
            },

            {
                title: "Fungsi yang Berguna",
                html: `
                <h2>✅ Fungsi yang Membuat App Lebih Berguna</h2>

                <div class="choices" data-multi="useful">
                    <div class="choice" data-correct="true">Bisa menghitung saldo atau target</div>
                    <div class="choice" data-correct="true">Bisa menampilkan hasil yang mudah dipahami</div>
                    <div class="choice" data-correct="true">Bisa membantu user membuat keputusan sederhana</div>
                    <div class="choice" data-correct="false">Tidak perlu ada tombol yang berfungsi</div>
                </div>

                <button class="btn primary" id="checkUseful">Cek</button>
                <div class="feedback" id="usefulFb"></div>
                `
            },

            {
                title: "Perancangan Layar",
                html: `
                <h2>🖼️ Rancang Tampilan dengan Jelas</h2>
                <p>Tampilan aplikasi sebaiknya sederhana dan mudah dipahami pengguna.</p>

                <div class="grid cols2">
                    <div class="card stepCard">
                        <div class="stepNum">1</div>
                        <div>
                            <h3>Judul jelas</h3>
                            <p>User langsung tahu aplikasi ini untuk apa.</p>
                        </div>
                    </div>
                    <div class="card stepCard">
                        <div class="stepNum">2</div>
                        <div>
                            <h3>Input rapi</h3>
                            <p>Kolom dan tombol disusun dengan teratur.</p>
                        </div>
                    </div>
                    <div class="card stepCard">
                        <div class="stepNum">3</div>
                        <div>
                            <h3>Hasil mudah dibaca</h3>
                            <p>Output tampil jelas, tidak membingungkan.</p>
                        </div>
                    </div>
                    <div class="card stepCard">
                        <div class="stepNum">4</div>
                        <div>
                            <h3>Warna tidak berlebihan</h3>
                            <p>Gunakan desain yang enak dilihat dan mendukung fungsi.</p>
                        </div>
                    </div>
                </div>
                `
            },

            {
                title: "Logic Check",
                html: `
                <h2>🔀 Logic dalam App Inventor</h2>
                <p>Yang penting bukan cuma screen-nya, tapi apa yang terjadi saat tombol ditekan atau data dimasukkan.</p>

                <div class="choices" data-quiz="logic">
                    <div class="choice" data-answer="wrong">Tombol hanya pindah warna</div>
                    <div class="choice" data-answer="right">Tombol menjalankan perhitungan atau menampilkan hasil</div>
                    <div class="choice" data-answer="wrong">Semua tombol tidak perlu dihubungkan ke blok</div>
                </div>

                <div class="feedback" data-quiz-feedback="logic"></div>
                `
            },

            {
                title: "Testing",
                html: `
                <h2>🧪 Testing Aplikasi</h2>
                <p>Sebelum submit, cek apakah aplikasimu berjalan dengan baik dari awal sampai akhir.</p>

                <div class="checklist" data-checklist="testing">
                    <div class="checkItem"><div class="checkBox">✓</div><div>Tombol utama berfungsi</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Input bisa digunakan dengan benar</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Hasil muncul dengan jelas</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Tidak ada error saat demo</div></div>
                </div>

                <div class="meterWrap">
                    <div class="meter"><div class="meterBar" id="testingMeter"></div></div>
                    <div class="meterText" id="testingMeterText">0 dari 4 langkah testing selesai</div>
                </div>
                `
            },

            {
                title: "Output yang Baik",
                html: `
                <h2>📣 Output yang Baik Itu Seperti Apa?</h2>
                <p>Hasil aplikasi jangan hanya angka, tapi juga membantu user memahami kondisinya.</p>

                <div class="grid cols2">
                    <div class="card">
                        <h3>Kurang kuat</h3>
                        <div class="flowBox">Saldo: 15000</div>
                    </div>
                    <div class="card">
                        <h3>Lebih kuat</h3>
                        <div class="flowBox">Saldo kamu sekarang Rp15.000. Kamu masih perlu menabung Rp35.000 lagi untuk mencapai target minggu ini.</div>
                    </div>
                </div>
                `
            },

            {
                title: "Bug Handling",
                html: `
                <h2>🐞 Kalau Ada Error, Apa yang Harus Dicek?</h2>

                <div class="choices" data-quiz="bug">
                    <div class="choice" data-answer="wrong">Langsung ganti ide aplikasi</div>
                    <div class="choice" data-answer="right">Cek blok, tombol, input, dan alur hasilnya</div>
                    <div class="choice" data-answer="wrong">Biarkan saja asalkan tampilan bagus</div>
                </div>

                <div class="feedback" data-quiz-feedback="bug"></div>
                `
            },

            {
                title: "Pitch Focus",
                html: `
                <h2>🎤 Saat Pitching, Jelaskan Ini</h2>

                <div class="grid cols2">
                    <div class="card">
                        <h3>Isi pitching</h3>
                        <ul class="list">
                            <li>Masalah yang dipilih</li>
                            <li>Solusi berupa aplikasi</li>
                            <li>Cara kerja aplikasi</li>
                            <li>Manfaat aplikasi</li>
                        </ul>
                    </div>
                    <div class="card">
                        <h3>Yang harus terlihat</h3>
                        <ul class="list">
                            <li>Kamu paham aplikasi yang dibuat</li>
                            <li>Fitur utama berjalan</li>
                            <li>Solusi sesuai tema financial literacy</li>
                        </ul>
                    </div>
                </div>
                `
            },

            {
                title: "Latihan Penjelasan",
                html: `
                <h2>🗣️ Latihan Menjelaskan App</h2>
                <p>Isi bagian ini sebagai latihan sebelum presentasi.</p>

                <div class="grid">
                    <textarea class="input" placeholder="Masalah: masalah apa yang ingin kamu selesaikan?"></textarea>
                    <textarea class="input" placeholder="Fitur utama: apa fungsi utama aplikasi kamu?"></textarea>
                    <textarea class="input" placeholder="Cara kerja: user input apa, app memproses apa, dan output-nya seperti apa?"></textarea>
                    <textarea class="input" placeholder="Manfaat: apa yang dibantu oleh aplikasi ini?"></textarea>
                </div>
                `
            },

            {
                title: "Final Checklist",
                html: `
                <h2>✅ Final Checklist</h2>

                <div class="checklist" data-checklist="final">
                    <div class="checkItem"><div class="checkBox">✓</div><div>Masalah dan tujuan aplikasi sudah jelas</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Fitur utama berjalan dengan baik</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Output mudah dipahami</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Aplikasi sudah dites</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Sudah siap menjelaskan aplikasi</div></div>
                </div>

                <div class="meterWrap">
                    <div class="meter"><div class="meterBar" id="finalMeter"></div></div>
                    <div class="meterText" id="finalMeterText">0 dari 5 komponen siap</div>
                </div>
                `
            },

            {
                title: "Penutup",
                html: `
                <h2>🔥 Kamu Siap Membuat dan Menjelaskan Aplikasi</h2>

                <div class="card">
                    <ul class="list">
                        <li>Kamu sudah memahami alur aplikasi</li>
                        <li>Kamu tahu cara membuat fitur yang lebih berguna</li>
                        <li>Kamu siap testing dan pitching</li>
                    </ul>
                </div>

                <button class="btn primary" data-goto="0">Restart</button>
                `
            }

        ];

        let idx = 0;
        const content = document.getElementById("content");
        const bar = document.getElementById("bar");
        const count = document.getElementById("count");
        const btnPrev = document.getElementById("btnPrev");
        const btnNext = document.getElementById("btnNext");
        const btnHome = document.getElementById("btnHome");

        function clamp(n, a, b) {
            return Math.max(a, Math.min(b, n));
        }

        function showFeedback(el, html, type) {
            if (!el) return;
            el.classList.add("show");
            el.classList.remove("fbOk", "fbBad");
            if (type === "ok") el.classList.add("fbOk");
            if (type === "bad") el.classList.add("fbBad");
            el.innerHTML = html;
        }

        function getQuizMsg(id, ok) {
            const msgs = {
                feature: {
                    ok: "✅ Betul! Fitur utama harus mendukung tujuan aplikasi dan membantu pengguna memahami pengelolaan uang.",
                    bad: "⚠️ Coba lagi. Fitur utama seharusnya berhubungan langsung dengan solusi yang ingin diberikan."
                },
                flow: {
                    ok: "✅ Betul! Alur aplikasi yang baik adalah input → process → output.",
                    bad: "⚠️ Belum tepat. Coba ingat lagi urutannya: data masuk dulu, diproses, lalu hasil ditampilkan."
                },
                logic: {
                    ok: "✅ Tepat! Yang penting dalam App Inventor adalah blok dan fungsi yang membuat aplikasi benar-benar bekerja.",
                    bad: "⚠️ Belum tepat. Aplikasi yang baik tidak hanya tampak menarik, tapi juga punya fungsi yang berjalan."
                },
                bug: {
                    ok: "✅ Benar! Saat ada error, cek blok, tombol, input, dan urutan alur aplikasimu.",
                    bad: "⚠️ Belum tepat. Error adalah bagian dari proses belajar membuat aplikasi."
                }
            };
            const m = msgs[id];
            if (!m) return ok ? "✅ Benar!" : "⚠️ Coba lagi.";
            return ok ? m.ok : m.bad;
        }

        function wireQuiz(group) {
            const id = group.getAttribute("data-quiz");
            const fb = content.querySelector(`[data-quiz-feedback="${id}"]`);
            const items = [...group.querySelectorAll(".choice")];

            items.forEach(ch => {
                ch.addEventListener("click", () => {
                    items.forEach(x => x.classList.remove("active", "ok", "bad"));
                    ch.classList.add("active");
                    const isRight = ch.getAttribute("data-answer") === "right";
                    ch.classList.add(isRight ? "ok" : "bad");
                    showFeedback(fb, getQuizMsg(id, isRight), isRight ? "ok" : "bad");
                });
            });
        }

        function wireChecklist(group) {
            const items = [...group.querySelectorAll(".checkItem")];
            const parentId = group.getAttribute("data-checklist");

            let meterId = "";
            let textId = "";

            if (parentId === "testing") {
                meterId = "testingMeter";
                textId = "testingMeterText";
            } else if (parentId === "final") {
                meterId = "finalMeter";
                textId = "finalMeterText";
            }

            const meterBar = content.querySelector(`#${meterId}`);
            const meterText = content.querySelector(`#${textId}`);

            const refresh = () => {
                const done = items.filter(item => item.classList.contains("done")).length;
                const total = items.length;
                const pct = total ? (done / total) * 100 : 0;

                if (meterBar) meterBar.style.width = `${pct}%`;
                if (meterText) {
                    if (parentId === "testing") {
                        meterText.textContent = `${done} dari ${total} langkah testing selesai`;
                    } else if (parentId === "final") {
                        meterText.textContent = `${done} dari ${total} komponen siap`;
                    }
                }
            };

            items.forEach(item => {
                item.addEventListener("click", () => {
                    item.classList.toggle("done");
                    refresh();
                });
            });

            refresh();
        }

        function wireMulti(group) {
            const id = group.getAttribute("data-multi");
            const items = [...group.querySelectorAll(".choice")];

            items.forEach(item => {
                item.addEventListener("click", () => {
                    item.classList.toggle("active");
                });
            });

            if (id === "useful") {
                const btnCheck = content.querySelector("#checkUseful");
                const fb = content.querySelector("#usefulFb");

                if (btnCheck) {
                    btnCheck.addEventListener("click", () => {
                        let allCorrect = true;
                        let selectedAny = false;

                        items.forEach(item => {
                            const isActive = item.classList.contains("active");
                            const isCorrect = item.getAttribute("data-correct") === "true";

                            item.classList.remove("ok", "bad");

                            if (isActive) {
                                selectedAny = true;
                                item.classList.add(isCorrect ? "ok" : "bad");
                            }

                            if ((isCorrect && !isActive) || (!isCorrect && isActive)) {
                                allCorrect = false;
                            }
                        });

                        if (!selectedAny) {
                            showFeedback(fb, "⚠️ Pilih dulu jawaban yang menurutmu benar.", "bad");
                            return;
                        }

                        if (allCorrect) {
                            showFeedback(fb, "✅ Tepat! Aplikasi yang berguna membantu user lewat fungsi yang berjalan, hasil yang jelas, dan solusi yang relevan.", "ok");
                        } else {
                            showFeedback(fb, "⚠️ Masih belum tepat. Ingat, aplikasi tetap harus punya tombol dan fungsi yang benar-benar bekerja.", "bad");
                        }
                    });
                }
            }
        }

        function render() {
            const s = slides[idx];
            content.innerHTML = s.html;

            const pct = ((idx + 1) / slides.length) * 100;
            bar.style.width = pct + "%";
            count.textContent = `${idx + 1}/${slides.length}`;

            content.querySelectorAll("[data-quiz]").forEach(wireQuiz);
            content.querySelectorAll("[data-checklist]").forEach(wireChecklist);
            content.querySelectorAll("[data-multi]").forEach(wireMulti);

            content.querySelectorAll("[data-goto]").forEach(b => {
                b.addEventListener("click", () => {
                    const to = Number(b.getAttribute("data-goto"));
                    idx = clamp(to, 0, slides.length - 1);
                    render();
                    content.scrollTop = 0;
                });
            });
        }

        function go(d) {
            idx = clamp(idx + d, 0, slides.length - 1);
            render();
            content.scrollTop = 0;
        }

        btnPrev.addEventListener("click", () => go(-1));
        btnNext.addEventListener("click", () => go(1));
        btnHome.addEventListener("click", () => {
            idx = 0;
            render();
            content.scrollTop = 0;
        });

        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") go(-1);
            if (e.key === "ArrowRight") go(1);
            if (e.key === "Home") {
                idx = 0;
                render();
                content.scrollTop = 0;
            }
        });

        render();
    </script>
</body>

</html>
