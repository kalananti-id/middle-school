<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UOB MDS – Middle School – Coding Festival Stage 1</title>
    <style>
        :root {
            --bg1: #F7FAFF;
            --bg2: #F3F6FF;
            --card: #FFFFFF;
            --ink: #0F172A;
            --muted: #475569;
            --line: rgba(226, 232, 240, .95);
            --brand: #4F46E5;
            --brand2: #06B6D4;
            --ok: #16A34A;
            --bad: #DC2626;
            --warn: #F59E0B;
            --radius: 22px;
            --shadow: 0 18px 40px rgba(15, 23, 42, .08);
            --shadow2: 0 10px 22px rgba(15, 23, 42, .06);
            --focus: 0 0 0 4px rgba(79, 70, 229, .18);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--sans);
            color: var(--ink);
            background:
                radial-gradient(1200px 520px at 10% 0%, rgba(6, 182, 212, .18), transparent 60%),
                radial-gradient(1200px 520px at 90% 0%, rgba(79, 70, 229, .16), transparent 55%),
                linear-gradient(180deg, var(--bg1), var(--bg2) 45%, var(--bg1));
            min-height: 100vh;
        }

        .app {
            width: min(1100px, 96vw);
            margin: 18px auto 26px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, .72);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow2);
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(79, 70, 229, .18), rgba(6, 182, 212, .20));
            border: 1px solid rgba(226, 232, 240, .9);
            display: grid;
            place-items: center;
            font-weight: 1000;
            color: rgba(79, 70, 229, 1);
        }

        .brand h1 {
            margin: 0;
            font-size: 14px;
            line-height: 1.15;
            letter-spacing: .2px;
        }

        .brand .sub {
            font-size: 12px;
            color: var(--muted);
            font-weight: 800;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .9);
            padding: 10px 12px;
            border-radius: 16px;
            font-weight: 1000;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(15, 23, 42, .06);
            transition: transform .06s ease, box-shadow .12s ease, background .12s ease;
            user-select: none;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0px);
        }

        .btn.primary {
            background: linear-gradient(135deg, rgba(79, 70, 229, .12), rgba(6, 182, 212, .14));
            border-color: rgba(79, 70, 229, .18);
        }

        .btn.ghost {
            background: transparent;
            box-shadow: none;
        }

        .btn:focus {
            outline: none;
            box-shadow: var(--focus);
        }

        .progressWrap {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 260px;
            justify-content: flex-end;
        }

        .progress {
            width: 180px;
            height: 10px;
            background: rgba(226, 232, 240, .9);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, .95);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(79, 70, 229, .85), rgba(6, 182, 212, .85));
            border-radius: 999px;
            transition: width .25s ease;
        }

        .count {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            font-weight: 900;
        }

        .stage {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, .60);
            box-shadow: var(--shadow);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: calc(100vh - 145px);
        }

        .slide {
            flex: 1;
            background: rgba(255, 255, 255, .68);
            border: 1px solid rgba(229, 234, 245, .95);
            border-radius: var(--radius);
            box-shadow: var(--shadow2);
            padding: 20px;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .slideInner {
            max-width: 980px;
            margin: 0 auto;
            max-height: calc(100vh - 190px);
            overflow-y: auto;
            padding-right: 8px;
        }

        .slideInner::-webkit-scrollbar {
            width: 10px;
        }

        .slideInner::-webkit-scrollbar-thumb {
            background: rgba(96, 112, 153, .25);
            border-radius: 999px;
            border: 3px solid rgba(255, 255, 255, .9);
        }

        .slideInner::-webkit-scrollbar-track {
            background: transparent;
        }

        h2 {
            margin: 6px 0 10px;
            font-size: 30px;
            letter-spacing: -.3px;
        }

        h3 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        p {
            margin: 0 0 10px;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.55;
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 1000;
            font-size: 12px;
            letter-spacing: .2px;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid rgba(79, 70, 229, .16);
            background: rgba(79, 70, 229, .06);
            color: rgba(55, 65, 81, .95);
        }

        .grid {
            display: grid;
            gap: 14px;
        }

        .cols2 {
            grid-template-columns: 1fr 1fr;
        }

        .cols3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .card {
            background: rgba(255, 255, 255, .92);
            border: 1px solid rgba(226, 232, 240, .95);
            border-radius: 22px;
            padding: 14px;
            box-shadow: 0 10px 18px rgba(15, 23, 42, .06);
        }

        .miniRow {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .92);
            color: rgba(30, 41, 59, .92);
            font-weight: 1000;
            font-size: 12px;
        }

        ul.list {
            margin: 8px 0 0 18px;
            color: var(--muted);
            font-weight: 850;
            line-height: 1.55;
        }

        .choices {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .choice {
            border: 1px solid rgba(226, 232, 240, .95);
            border-radius: 18px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, .96);
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
            cursor: pointer;
            user-select: none;
            transition: transform .06s ease, border-color .12s ease, background .12s ease;
        }

        .choice:hover {
            transform: translateY(-1px);
        }

        .choice.active {
            border-color: rgba(79, 70, 229, .35);
            background: rgba(79, 70, 229, .06);
        }

        .choice.ok {
            border-color: rgba(22, 163, 74, .35);
            background: rgba(22, 163, 74, .08);
        }

        .choice.bad {
            border-color: rgba(220, 38, 38, .35);
            background: rgba(220, 38, 38, .08);
        }

        .feedback {
            display: none;
            margin-top: 10px;
            border-radius: 18px;
            padding: 12px 14px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .92);
            color: var(--muted);
            font-weight: 900;
            line-height: 1.5;
        }

        .feedback.show {
            display: block;
        }

        .fbOk {
            border-color: rgba(22, 163, 74, .35);
            background: rgba(22, 163, 74, .08);
            color: rgba(15, 23, 42, .92);
        }

        .fbBad {
            border-color: rgba(220, 38, 38, .35);
            background: rgba(220, 38, 38, .08);
            color: rgba(15, 23, 42, .92);
        }

        .input {
            width: 100%;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .96);
            border-radius: 16px;
            padding: 12px 14px;
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
            resize: vertical;
            min-height: 54px;
        }

        .emojiBig {
            font-size: 58px;
            line-height: 1;
        }

        .checklist {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .checkItem {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 18px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .96);
            cursor: pointer;
            user-select: none;
            transition: transform .06s ease, border-color .12s ease, background .12s ease;
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
        }

        .checkItem:hover {
            transform: translateY(-1px);
        }

        .checkItem.done {
            border-color: rgba(79, 70, 229, .30);
            background: rgba(79, 70, 229, .06);
        }

        .checkBox {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 1.5px solid rgba(148, 163, 184, .8);
            display: grid;
            place-items: center;
            font-size: 14px;
            font-weight: 1000;
            color: transparent;
            background: #fff;
            flex: 0 0 auto;
        }

        .checkItem.done .checkBox {
            background: linear-gradient(135deg, rgba(79, 70, 229, .9), rgba(6, 182, 212, .85));
            border-color: transparent;
            color: white;
        }

        .meterWrap {
            margin-top: 12px;
        }

        .meter {
            width: 100%;
            height: 12px;
            background: rgba(226, 232, 240, .9);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, .95);
        }

        .meterBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(79, 70, 229, .85), rgba(6, 182, 212, .85));
            border-radius: 999px;
            transition: width .25s ease;
        }

        .meterText {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
            font-weight: 900;
        }

        .ideaTags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .ideaTag {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .96);
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
            cursor: pointer;
            transition: transform .06s ease, border-color .12s ease, background .12s ease;
            user-select: none;
        }

        .ideaTag:hover {
            transform: translateY(-1px);
        }

        .ideaTag.active {
            border-color: rgba(79, 70, 229, .35);
            background: rgba(79, 70, 229, .08);
        }

        .resultBox {
            margin-top: 14px;
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .92);
            color: var(--muted);
            font-weight: 900;
            line-height: 1.5;
        }

        @media (max-width: 860px) {
            .cols2,
            .cols3 {
                grid-template-columns: 1fr;
            }

            .progressWrap {
                min-width: unset;
            }

            .progress {
                width: 130px;
            }

            h2 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <div id="accessGate"
        style="position:fixed; inset:0; background:linear-gradient(135deg,#eef2ff,#ecfeff); display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div class="card" style="max-width:420px;width:92%;text-align:center">
            <h2>🔐 Kode Akses</h2>
            <p>Masukkan kode untuk memulai sesi.</p>
            <input id="accessInput" class="input" placeholder="MASUKKAN KODE" autocomplete="off"
                style="text-align:center;font-weight:900;letter-spacing:2px;min-height:auto" />
            <button class="btn primary" id="accessBtn" style="margin-top:12px">Masuk</button>
            <div class="feedback" id="accessFb" style="margin-top:10px"></div>
            <div class="card" style="margin-top:10px;background:rgba(79,70,229,.05)">
                <p style="margin:0">Kode diberikan oleh guru.</p>
            </div>
        </div>
    </div>

    <div class="app">
        <div class="topbar">
            <div class="brand">
                <div class="logo">MS</div>
                <div>
                    <h1>Middle School</h1>
                    <div class="sub">Coding Festival – Stage 1</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn ghost" id="btnHome" title="Kembali ke awal">🏠 Awal</button>
                <button class="btn" id="btnPrev" title="Sebelumnya (←)">←</button>
                <button class="btn primary" id="btnNext" title="Berikutnya (→)">→</button>
            </div>

            <div class="progressWrap">
                <div class="progress" aria-label="Progress">
                    <div class="bar" id="bar"></div>
                </div>
                <div class="count" id="count">1/1</div>
            </div>
        </div>

        <div class="stage">
            <div class="slide" role="region" aria-label="Slide">
                <div class="slideInner" id="content"></div>
            </div>
        </div>
    </div>

    <script>
        const slides = [

            {
                title: "Pembuka",
                html: `
                <div class="kicker">Middle School • MIT App Inventor • Stage 1</div>
                <h2>🚀 Coding Festival Dimulai</h2>
                <p>Kali ini kamu tidak hanya belajar coding, tapi juga membuat <b>solusi digital</b> untuk membantu pengguna memahami pengelolaan uang dengan lebih baik.</p>

                <div class="card" style="margin-top:12px;text-align:center">
                    <div class="emojiBig">📱💰</div>
                    <p style="margin-top:10px"><b>Kamu akan merancang aplikasi sederhana dengan MIT App Inventor</b></p>
                </div>
                `
            },

            {
                title: "Apa itu Coding Festival",
                html: `
                <h2>Coding Festival</h2>
                <p>Coding Festival adalah kegiatan pembelajaran berbasis proyek. Kamu akan belajar dari ide, perancangan, pembuatan aplikasi, sampai presentasi.</p>

                <div class="card">
                    <ul class="list">
                        <li>Kamu membuat solusi dari sebuah masalah</li>
                        <li>Solusi dibuat dalam bentuk proyek coding</li>
                        <li>Kamu belajar dari ide sampai presentasi</li>
                    </ul>
                </div>
                `
            },

            {
                title: "Stage 1",
                html: `
                <h2>🎯 Stage 1: Build Your Project</h2>
                <p>Di tahap ini, kamu akan mulai membangun fondasi proyekmu.</p>

                <div class="checklist" data-checklist="stage1">
                    <div class="checkItem"><div class="checkBox">✓</div><div>Menentukan problem</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Merancang aplikasi</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Membangun logic dan fitur</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Menyiapkan pitching</div></div>
                </div>

                <div class="meterWrap">
                    <div class="meter"><div class="meterBar" id="stage1Meter"></div></div>
                    <div class="meterText" id="stage1MeterText">0 dari 4 langkah dipahami</div>
                </div>
                `
            },

            {
                title: "Tema",
                html: `
                <h2>💰 Tema: Financial Literacy</h2>
                <p>Proyekmu perlu membantu pengguna memahami pengelolaan uang dengan lebih baik.</p>

                <div class="ideaTags" data-select-group="tema">
                    <div class="ideaTag">Pemasukan dan pengeluaran</div>
                    <div class="ideaTag">Saldo tabungan otomatis</div>
                    <div class="ideaTag">Target tabungan</div>
                    <div class="ideaTag">Kategori pengeluaran</div>
                    <div class="ideaTag">Simulasi rekening tabungan</div>
                </div>

                <div class="resultBox" id="temaResult">Pilih satu topik yang menurutmu paling menarik untuk dijadikan aplikasi.</div>
                `
            },

            {
                title: "Khusus SMP",
                html: `
                <h2>📱 Untuk SMP: Aplikasi Smartphone</h2>
                <p>Untuk jenjang Middle School, memfokuskan proyek pada pembuatan aplikasi untuk smartphone.</p>

                <div class="card">
                    <div class="kicker">Contoh bentuk proyek</div>
                    <ul class="list">
                        <li>Aplikasi pencatatan pemasukan dan pengeluaran</li>
                        <li>Aplikasi target tabungan</li>
                        <li>Aplikasi saldo otomatis</li>
                        <li>Simulasi penggunaan rekening tabungan</li>
                    </ul>
                </div>
                `
            },

            {
                title: "Problem yang Tepat",
                html: `
                <h2>🧠 Problem yang Tepat</h2>
                <p>Proyek yang kuat dimulai dari masalah yang nyata dan relevan.</p>

                <div class="choices" data-quiz="problem">
                    <div class="choice" data-answer="right">Siswa sering tidak tahu uangnya habis untuk apa</div>
                    <div class="choice" data-answer="wrong">Karakter ingin balapan lebih cepat</div>
                    <div class="choice" data-answer="wrong">Aplikasi tentang ganti wallpaper HP</div>
                </div>

                <div class="feedback" data-quiz-feedback="problem"></div>
                `
            },

            {
                title: "Struktur Project",
                html: `
                <h2>🧩 Struktur Project yang Baik</h2>

                <div class="card">
                    <ul class="list">
                        <li><b>Problem</b> → masalah yang ingin diselesaikan</li>
                        <li><b>Input</b> → data yang dimasukkan pengguna</li>
                        <li><b>Process / Logic</b> → perhitungan atau pengolahan data</li>
                        <li><b>Output</b> → hasil yang ditampilkan aplikasi</li>
                    </ul>
                </div>
                `
            },

            {
                title: "Logic Thinking",
                html: `
                <h2>🔀 Coba Pikirkan Logic Aplikasi</h2>
                <p>Jika pengguna memasukkan data, apa yang seharusnya dilakukan aplikasi?</p>

                <div class="choices" data-quiz="logic">
                    <div class="choice" data-answer="wrong">Aplikasi hanya menampilkan gambar</div>
                    <div class="choice" data-answer="right">Aplikasi menghitung, mengelompokkan, lalu menampilkan hasil</div>
                    <div class="choice" data-answer="wrong">Semua tombol menghasilkan tampilan yang sama</div>
                </div>

                <div class="feedback" data-quiz-feedback="logic"></div>
                `
            },

            {
                title: "Contoh Ide",
                html: `
                <h2>💡 Contoh Ide Aplikasi</h2>

                <div class="grid cols2" style="margin-top:12px">
                    <div class="card">
                        <div class="kicker">Ide 1</div>
                        <p style="margin:8px 0 0"><b>TabunganKu</b></p>
                        <p style="margin:8px 0 0">Pengguna mencatat setoran dan penarikan, lalu aplikasi menghitung saldo otomatis.</p>
                    </div>

                    <div class="card">
                        <div class="kicker">Ide 2</div>
                        <p style="margin:8px 0 0"><b>Budget Harian</b></p>
                        <p style="margin:8px 0 0">Pengguna memasukkan pengeluaran, lalu aplikasi mengelompokkan mana yang paling sering dibeli.</p>
                    </div>
                </div>
                `
            },

            {
                title: "Ciri Proyek Bagus",
                html: `
                <h2>✅ Pilih Ciri Proyek Bagus</h2>
                <p>Pilih semua pernyataan yang menunjukkan proyekmu sudah kuat.</p>

                <div class="choices" data-multi="good">
                    <div class="choice" data-correct="true">Ada problem yang jelas</div>
                    <div class="choice" data-correct="true">Ada input, proses, dan output</div>
                    <div class="choice" data-correct="true">Sesuai tema financial literacy</div>
                    <div class="choice" data-correct="false">Tidak perlu fungsi yang berjalan</div>
                </div>

                <button class="btn primary" id="checkGood">Cek</button>
                <div class="feedback" id="goodFb"></div>
                `
            },

            {
                title: "Pengembangan Fitur",
                html: `
                <h2>⚙️ Mengembangkan Fitur dan Logic</h2>
                <p>Setelah aplikasi dasar jadi, kamu bisa mengembangkan fitur agar lebih bermanfaat.</p>

                <div class="card">
                    <ul class="list">
                        <li>Perhitungan saldo otomatis</li>
                        <li>Kategori pengeluaran</li>
                        <li>Target tabungan</li>
                        <li>Analisis kebiasaan pengeluaran</li>
                        <li>Perbaikan error (debugging)</li>
                    </ul>
                </div>
                `
            },

            {
                title: "Pitching",
                html: `
                <h2>🗣️ Pitching App Kamu</h2>
                <p>Selain membuat aplikasi, kamu juga harus bisa menjelaskan idenya dengan jelas.</p>

                <div class="card">
                    <ul class="list">
                        <li><b>Problem</b> → masalah yang diangkat</li>
                        <li><b>Solution</b> → aplikasi yang dibuat</li>
                        <li><b>How it works</b> → cara kerja aplikasi</li>
                        <li><b>Impact</b> → manfaat bagi pengguna</li>
                    </ul>
                </div>
                `
            },

            {
                title: "Latihan Pitch",
                html: `
                <h2>🎤 Coba Buat Draft Pitch</h2>
                <p>Isi draft singkat ini untuk membantu kamu menyiapkan presentasi.</p>

                <textarea class="input" id="p1" placeholder="Problem..."></textarea>
                <textarea class="input" id="p2" placeholder="Solution / nama aplikasi..." style="margin-top:10px"></textarea>
                <textarea class="input" id="p3" placeholder="How it works..." style="margin-top:10px"></textarea>
                <textarea class="input" id="p4" placeholder="Impact / manfaat..." style="margin-top:10px"></textarea>

                <button class="btn primary" id="preview" style="margin-top:10px">Preview</button>
                <div class="feedback" id="previewFb"></div>
                `
            },

            {
                title: "Submission SMP",
                html: `
                <h2>📦 Submission untuk SMP</h2>
                <p>Pastikan semua komponen ini sudah siap sebelum dikumpulkan.</p>

                <div class="checklist" data-checklist="submit">
                    <div class="checkItem"><div class="checkBox">✓</div><div>Link Gallery MIT App Inventor</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Video demo aplikasi</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Deskripsi proyek</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Screenshot proyek</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Foto profil</div></div>
                    <div class="checkItem"><div class="checkBox">✓</div><div>Pitch deck</div></div>
                </div>

                <div class="meterWrap">
                    <div class="meter"><div class="meterBar" id="submitMeter"></div></div>
                    <div class="meterText" id="submitMeterText">0 dari 6 komponen siap</div>
                </div>
                `
            },

            {
                title: "Checklist Akhir",
                html: `
                <h2>🧪 Cek Sebelum Submit</h2>

                <div class="choices" data-quiz="check">
                    <div class="choice" data-answer="wrong">Yang penting desainnya bagus</div>
                    <div class="choice" data-answer="right">Aplikasi berjalan, mudah dipahami, dan link bisa dibuka</div>
                    <div class="choice" data-answer="wrong">Cukup kirim screenshot saja</div>
                </div>

                <div class="feedback" data-quiz-feedback="check"></div>
                `
            },

            {
                title: "Brainstorm",
                html: `
                <h2>💡 Brainstorm Aplikasi</h2>
                <p>Tuliskan ide awal proyekmu di sini.</p>

                <textarea class="input" id="idea1" placeholder="Problem"></textarea>
                <textarea class="input" id="idea2" placeholder="Input & fitur utama" style="margin-top:10px"></textarea>
                <textarea class="input" id="idea3" placeholder="Output / hasil yang ditampilkan" style="margin-top:10px"></textarea>

                <button class="btn primary" id="saveIdea" style="margin-top:10px">Simpan</button>
                <div class="feedback" id="ideaFb"></div>
                `
            },

            {
                title: "Penutup",
                html: `
                <h2>🔥 Kamu Siap</h2>

                <div class="card">
                    <ul class="list">
                        <li>Kamu sudah punya arah problem</li>
                        <li>Kamu tahu bentuk proyek SMP adalah aplikasi</li>
                        <li>Kamu memahami logic dasarnya</li>
                        <li>Kamu siap mulai merancang project</li>
                    </ul>
                </div>

                <button class="btn primary" data-goto="0">Restart</button>
                `
            }

        ];

        let idx = 0;
        const content = document.getElementById("content");
        const bar = document.getElementById("bar");
        const count = document.getElementById("count");
        const btnPrev = document.getElementById("btnPrev");
        const btnNext = document.getElementById("btnNext");
        const btnHome = document.getElementById("btnHome");

        function clamp(n, a, b) {
            return Math.max(a, Math.min(b, n));
        }

        const ACCESS_CODE = "RGMDSMS25";
        const gate = document.getElementById("accessGate");
        const input = document.getElementById("accessInput");
        const btn = document.getElementById("accessBtn");
        const fb = document.getElementById("accessFb");

        input.addEventListener("input", () => {
            input.value = input.value.toUpperCase();
        });

        btn.addEventListener("click", checkAccess);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") checkAccess();
        });

        function checkAccess() {
            if (input.value.trim() === ACCESS_CODE) {
                gate.style.display = "none";
            } else {
                fb.className = "feedback show fbBad";
                fb.textContent = "Kode salah. Coba lagi.";
            }
        }

        function showFeedback(el, html, type) {
            if (!el) return;
            el.classList.add("show");
            el.classList.remove("fbOk", "fbBad");
            if (type === "ok") el.classList.add("fbOk");
            if (type === "bad") el.classList.add("fbBad");
            el.innerHTML = html;
        }

        function getQuizMsg(id, ok) {
            const msgs = {
                problem: {
                    ok: "✅ Betul! Problem yang baik harus nyata dan berhubungan dengan pengelolaan uang.",
                    bad: "⚠️ Coba lagi. Untuk SMP, masalah proyek sebaiknya tetap terkait tabungan, pengeluaran, atau kebiasaan finansial."
                },
                logic: {
                    ok: "✅ Betul! Aplikasi yang baik menerima input, memproses data, lalu menampilkan hasil.",
                    bad: "⚠️ Belum tepat. Coba pilih jawaban yang menunjukkan ada proses atau logic di dalam aplikasi."
                },
                check: {
                    ok: "✅ Benar! Sebelum submit, aplikasi harus bisa dibuka, berjalan, dan mudah dipahami.",
                    bad: "⚠️ Belum tepat. Submission yang baik bukan hanya desain, tapi juga fungsi dan akses link."
                }
            };
            const m = msgs[id];
            if (!m) return ok ? "✅ Benar!" : "⚠️ Coba lagi.";
            return ok ? m.ok : m.bad;
        }

        function wireQuiz(group) {
            const id = group.getAttribute("data-quiz");
            const fb = content.querySelector(`[data-quiz-feedback="${id}"]`);
            const items = [...group.querySelectorAll(".choice")];

            items.forEach(ch => {
                ch.addEventListener("click", () => {
                    items.forEach(x => x.classList.remove("active", "ok", "bad"));
                    ch.classList.add("active");
                    const isRight = ch.getAttribute("data-answer") === "right";
                    ch.classList.add(isRight ? "ok" : "bad");
                    showFeedback(fb, getQuizMsg(id, isRight), isRight ? "ok" : "bad");
                });
            });
        }

        function wireChecklist(group) {
            const items = [...group.querySelectorAll(".checkItem")];
            const parentId = group.getAttribute("data-checklist");

            let meterId = "";
            let textId = "";

            if (parentId === "stage1") {
                meterId = "stage1Meter";
                textId = "stage1MeterText";
            } else if (parentId === "submit") {
                meterId = "submitMeter";
                textId = "submitMeterText";
            }

            const meterBar = content.querySelector(`#${meterId}`);
            const meterText = content.querySelector(`#${textId}`);

            const refresh = () => {
                const done = items.filter(item => item.classList.contains("done")).length;
                const total = items.length;
                const pct = total ? (done / total) * 100 : 0;

                if (meterBar) meterBar.style.width = `${pct}%`;
                if (meterText) {
                    if (parentId === "stage1") {
                        meterText.textContent = `${done} dari ${total} langkah dipahami`;
                    } else if (parentId === "submit") {
                        meterText.textContent = `${done} dari ${total} komponen siap`;
                    }
                }
            };

            items.forEach(item => {
                item.addEventListener("click", () => {
                    item.classList.toggle("done");
                    refresh();
                });
            });

            refresh();
        }

        function wireSelectGroup(group) {
            const id = group.getAttribute("data-select-group");
            const items = [...group.querySelectorAll(".ideaTag")];
            const resultBox = content.querySelector(`#${id}Result`);

            const mapping = {
                "Pemasukan dan pengeluaran": "Arah proyek: aplikasi yang mencatat pemasukan dan pengeluaran agar pengguna tahu kondisi uangnya.",
                "Saldo tabungan otomatis": "Arah proyek: aplikasi yang menghitung perubahan saldo secara otomatis setelah setoran atau penarikan.",
                "Target tabungan": "Arah proyek: aplikasi yang membantu pengguna memantau progres menuju target tabungan.",
                "Kategori pengeluaran": "Arah proyek: aplikasi yang mengelompokkan jenis pengeluaran agar kebiasaan belanja lebih terlihat.",
                "Simulasi rekening tabungan": "Arah proyek: aplikasi yang mensimulasikan cara kerja rekening sederhana, seperti setoran, penarikan, dan saldo."
            };

            items.forEach(item => {
                item.addEventListener("click", () => {
                    items.forEach(x => x.classList.remove("active"));
                    item.classList.add("active");
                    resultBox.innerHTML = `<b>${item.textContent}</b><br>${mapping[item.textContent] || "Gunakan topik ini sebagai dasar ide aplikasimu."}`;
                });
            });
        }

        function wireMulti(group) {
            const id = group.getAttribute("data-multi");
            const items = [...group.querySelectorAll(".choice")];

            items.forEach(item => {
                item.addEventListener("click", () => {
                    item.classList.toggle("active");
                });
            });

            if (id === "good") {
                const btnCheck = content.querySelector("#checkGood");
                const fb = content.querySelector("#goodFb");

                if (btnCheck) {
                    btnCheck.addEventListener("click", () => {
                        let allCorrect = true;
                        let selectedAny = false;

                        items.forEach(item => {
                            const isActive = item.classList.contains("active");
                            const isCorrect = item.getAttribute("data-correct") === "true";

                            item.classList.remove("ok", "bad");

                            if (isActive) {
                                selectedAny = true;
                                item.classList.add(isCorrect ? "ok" : "bad");
                            }

                            if ((isCorrect && !isActive) || (!isCorrect && isActive)) {
                                allCorrect = false;
                            }
                        });

                        if (!selectedAny) {
                            showFeedback(fb, "⚠️ Pilih dulu jawaban yang menurutmu benar.", "bad");
                            return;
                        }

                        if (allCorrect) {
                            showFeedback(fb, "✅ Tepat! Proyek yang bagus punya problem yang jelas, alur input-process-output, dan sesuai tema financial literacy.", "ok");
                        } else {
                            showFeedback(fb, "⚠️ Masih belum tepat. Ingat, proyek yang baik tetap harus punya fungsi yang berjalan, bukan hanya ide atau tampilan.", "bad");
                        }
                    });
                }
            }
        }

        function wirePitchPreview() {
            const btnPreview = content.querySelector("#preview");
            const fbPreview = content.querySelector("#previewFb");
            const p1 = content.querySelector("#p1");
            const p2 = content.querySelector("#p2");
            const p3 = content.querySelector("#p3");
            const p4 = content.querySelector("#p4");

            if (!btnPreview || !fbPreview) return;

            btnPreview.addEventListener("click", () => {
                const v1 = p1?.value.trim() || "";
                const v2 = p2?.value.trim() || "";
                const v3 = p3?.value.trim() || "";
                const v4 = p4?.value.trim() || "";

                if (!v1 && !v2 && !v3 && !v4) {
                    showFeedback(fbPreview, "⚠️ Isi dulu draft pitch-mu sebelum melihat preview.", "bad");
                    return;
                }

                showFeedback(
                    fbPreview,
                    `<b>Preview Pitch</b><br><br>
                    <b>Problem:</b> ${v1 || "-"}<br>
                    <b>Solution:</b> ${v2 || "-"}<br>
                    <b>How it works:</b> ${v3 || "-"}<br>
                    <b>Impact:</b> ${v4 || "-"}`,
                    "ok"
                );
            });
        }

        function wireIdeaSave() {
            const btnSave = content.querySelector("#saveIdea");
            const fbIdea = content.querySelector("#ideaFb");
            const i1 = content.querySelector("#idea1");
            const i2 = content.querySelector("#idea2");
            const i3 = content.querySelector("#idea3");

            if (!btnSave || !fbIdea) return;

            btnSave.addEventListener("click", () => {
                const v1 = i1?.value.trim() || "";
                const v2 = i2?.value.trim() || "";
                const v3 = i3?.value.trim() || "";

                if (!v1 && !v2 && !v3) {
                    showFeedback(fbIdea, "⚠️ Tuliskan dulu ide aplikasimu sebelum disimpan.", "bad");
                    return;
                }

                showFeedback(
                    fbIdea,
                    `✅ Ide awalmu sudah tersimpan di slide ini.<br><br>
                    <b>Problem:</b> ${v1 || "-"}<br>
                    <b>Input & fitur utama:</b> ${v2 || "-"}<br>
                    <b>Output:</b> ${v3 || "-"}`,
                    "ok"
                );
            });
        }

        function render() {
            const s = slides[idx];
            content.innerHTML = s.html;

            const pct = ((idx + 1) / slides.length) * 100;
            bar.style.width = pct + "%";
            count.textContent = `${idx + 1}/${slides.length}`;

            content.querySelectorAll("[data-quiz]").forEach(wireQuiz);
            content.querySelectorAll("[data-checklist]").forEach(wireChecklist);
            content.querySelectorAll("[data-select-group]").forEach(wireSelectGroup);
            content.querySelectorAll("[data-multi]").forEach(wireMulti);

            wirePitchPreview();
            wireIdeaSave();

            content.querySelectorAll("[data-goto]").forEach(b => {
                b.addEventListener("click", () => {
                    const to = Number(b.getAttribute("data-goto"));
                    idx = clamp(to, 0, slides.length - 1);
                    render();
                    content.scrollTop = 0;
                });
            });
        }

        function go(d) {
            idx = clamp(idx + d, 0, slides.length - 1);
            render();
            content.scrollTop = 0;
        }

        btnPrev.addEventListener("click", () => go(-1));
        btnNext.addEventListener("click", () => go(1));
        btnHome.addEventListener("click", () => {
            idx = 0;
            render();
            content.scrollTop = 0;
        });

        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") go(-1);
            if (e.key === "ArrowRight") go(1);
            if (e.key === "Home") {
                idx = 0;
                render();
                content.scrollTop = 0;
            }
        });

        render();
    </script>
</body>

</html>
